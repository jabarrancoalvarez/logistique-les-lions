services:
  - type: web
    name: logistique-les-lions-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: logistique-les-lions-api
      - key: Jwt__Audience
        value: logistique-les-lions-client
      - key: Jwt__AccessTokenExpirationMinutes
        value: "15"
      - key: Jwt__RefreshTokenExpirationDays
        value: "30"
      - key: Cors__AllowedOrigins
        sync: false
      - key: Frontend__Url
        sync: false
      - key: Storage__Provider
        value: local
      - key: Storage__LocalPath
        value: /app/uploads
