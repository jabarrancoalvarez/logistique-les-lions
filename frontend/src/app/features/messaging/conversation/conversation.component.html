<div class="flex flex-col h-[calc(100vh-80px)]">

  <!-- Messages list -->
  <div #messagesList class="flex-1 overflow-y-auto p-4 space-y-3 bg-navy/3">
    @if (loading()) {
      <div class="flex items-center justify-center h-full text-navy/40">
        Cargando mensajes...
      </div>
    } @else {
      @for (msg of messages(); track msg.id) {
        <div class="flex"
             [class.justify-end]="msg.senderId === auth.user()?.id"
             [class.justify-start]="msg.senderId !== auth.user()?.id">
          <div class="max-w-xs lg:max-w-md px-4 py-2.5 rounded-2xl text-sm text-navy"
               [ngClass]="msg.senderId === auth.user()?.id
                 ? 'bg-gold'
                 : 'bg-white border border-navy/10'">
            <p>{{ msg.body }}</p>
            <p class="text-xs mt-1 opacity-60 text-right">{{ msg.createdAt | date:'HH:mm' }}</p>
          </div>
        </div>
      }
    }
  </div>

  <!-- Input area -->
  <div class="border-t border-navy/10 bg-white p-4">
    <div class="flex gap-2 max-w-2xl mx-auto">
      <input
        type="text"
        [formControl]="bodyCtrl"
        placeholder="Escribe un mensaje..."
        (keydown.enter)="send()"
        class="flex-1 px-4 py-2.5 rounded-full border border-navy/20 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none text-navy text-sm"
      >
      <button
        (click)="send()"
        [disabled]="!bodyCtrl.value?.trim() || sending()"
        class="btn-gold px-4 py-2.5 rounded-full disabled:opacity-40"
        aria-label="Enviar mensaje"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>

</div>
