<div class="min-h-screen bg-gradient-to-br from-navy via-navy/95 to-navy/90 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/">
        <img src="assets/logo.jpeg" alt="Logistique Les Lions" class="h-16 mx-auto mb-4">
      </a>
      <h1 class="font-heading text-2xl font-bold text-ivory">Bienvenido de nuevo</h1>
      <p class="text-ivory/60 mt-1 text-sm">Inicia sesión en tu cuenta</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl p-8 shadow-2xl">

      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium text-navy mb-1.5" for="email">
            Correo electrónico
          </label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            class="w-full px-4 py-3 rounded-lg border border-navy/20 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-colors text-navy placeholder-navy/40"
            placeholder="tu@correo.com"
          >
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <p class="text-red-500 text-xs mt-1">Introduce un email válido.</p>
          }
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-navy mb-1.5" for="password">
            Contraseña
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            class="w-full px-4 py-3 rounded-lg border border-navy/20 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-colors text-navy placeholder-navy/40"
            placeholder="••••••••"
          >
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full btn-gold py-3 text-base font-semibold"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Iniciando sesión...
            </span>
          } @else {
            Iniciar sesión
          }
        </button>
      </form>

      <p class="text-center text-navy/60 text-sm mt-6">
        ¿No tienes cuenta?
        <a routerLink="/auth/register" class="text-gold font-medium hover:underline">Regístrate aquí</a>
      </p>
    </div>

  </div>
</div>
