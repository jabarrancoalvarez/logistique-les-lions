@if (isVisible()) {
  <div
    class="fixed bottom-4 left-4 right-4 lg:left-auto lg:right-6 lg:max-w-md z-[300] animate-fadeInUp"
    role="dialog"
    aria-labelledby="cookie-title"
    aria-describedby="cookie-desc"
  >
    <div class="bg-white rounded-2xl shadow-2xl border border-navy/10 overflow-hidden">
      <!-- Cabecera -->
      <div class="px-5 pt-5 pb-3 border-b border-navy/8">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-lg" aria-hidden="true">🍪</span>
          <h2 id="cookie-title" class="font-heading font-semibold text-navy text-base">Privacidad y cookies</h2>
        </div>
        <p id="cookie-desc" class="text-xs text-navy/60 leading-relaxed">
          Usamos cookies para mejorar tu experiencia y mostrarte contenido relevante.
          <a routerLink="/legal/cookies" class="text-gold hover:underline">Saber más</a>
        </p>
      </div>

      <!-- Detalles (desplegable) -->
      @if (showDetails()) {
        <div class="px-5 py-3 space-y-3 border-b border-navy/8 bg-ivory/50">
          @for (pref of cookiePrefs; track pref.key) {
            <div class="flex items-start justify-between gap-3">
              <div>
                <p class="text-xs font-semibold text-navy">{{ pref.label }}</p>
                <p class="text-xs text-navy/50">{{ pref.desc }}</p>
              </div>
              <button
                (click)="togglePref(pref.key)"
                class="relative w-10 h-6 rounded-full transition-colors duration-200 flex-shrink-0 mt-0.5"
                [ngClass]="isPrefEnabled(pref.key) ? 'bg-gold' : 'bg-navy/20'"
                [disabled]="pref.alwaysOn"
                [attr.aria-checked]="isPrefEnabled(pref.key)"
                [attr.aria-label]="'Cookies ' + pref.label"
                role="switch"
              >
                <span
                  class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-200"
                  [class.translate-x-4]="isPrefEnabled(pref.key)"
                ></span>
              </button>
            </div>
          }
        </div>
      }

      <!-- Acciones -->
      <div class="px-5 py-4 flex flex-col gap-2">
        <button (click)="acceptAll()" class="btn-gold w-full py-2.5 text-sm">
          Aceptar todas
        </button>
        <div class="flex gap-2">
          <button
            (click)="toggleDetails()"
            class="btn-outline flex-1 py-2 text-xs"
          >
            {{ showDetails() ? 'Ocultar' : 'Personalizar' }}
          </button>
          @if (showDetails()) {
            <button (click)="savePreferences()" class="btn-primary flex-1 py-2 text-xs">
              Guardar
            </button>
          } @else {
            <button (click)="acceptNecessary()" class="btn-outline flex-1 py-2 text-xs">
              Solo necesarias
            </button>
          }
        </div>
      </div>
    </div>
  </div>
}
