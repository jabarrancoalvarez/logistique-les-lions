version: '3.9'

services:
  # ─── Base de datos PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lll_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: logistique_les_lions
      POSTGRES_USER: lll_user
      POSTGRES_PASSWORD: lll_secure_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lll_user -d logistique_les_lions"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lll_network

  # ─── pgAdmin 4 ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lll_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@logistiqueleslions.com
      PGADMIN_DEFAULT_PASSWORD: admin_dev_password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lll_network

  # ─── Redis (caché) ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lll_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_dev_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lll_network

  # ─── Backend .NET 9 ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lll_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=logistique_les_lions;Username=lll_user;Password=lll_secure_password_dev;Include Error Detail=true"
      ConnectionStrings__Redis: "redis:6379,password=redis_dev_password"
      Jwt__Key: "dev_jwt_secret_key_minimum_32_characters_long_for_hmac"
      Jwt__Issuer: "logistique-les-lions-api"
      Jwt__Audience: "logistique-les-lions-client"
      Jwt__AccessTokenExpirationMinutes: "15"
      Jwt__RefreshTokenExpirationDays: "30"
      Cors__AllowedOrigins: "http://localhost:4200"
      Frontend__Url: "http://localhost:4200"
      Anthropic__ApiKey: "CONFIGURE_IN_ENV"
      Storage__Provider: "local"
      Storage__LocalPath: "/app/uploads"
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lll_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Frontend Angular 19 ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lll_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - lll_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  lll_network:
    driver: bridge
